<main class="app-container">
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="logo-container">
        <div class="angular-logo">
          <div class="header-icon">
            <i class="fas fa-headphones"></i>
          </div>
          <div class="app-title">
            <h1>Music Player</h1>
            <p class="app-subtitle">
              <span class="angular-sub-icon">
                <img src="https://angular.io/assets/images/logos/angular/angular.svg" alt="Angular">
              </span>
              Developed In Angular
            </p>
          </div>
        </div>
      </div>
      <p class="tagline">Music In Angular</p>
    </div>
  </header>

  <!-- Contenido Principal -->
  <div class="main-content-wrapper">
    <div class="main-dark-content">
      <app-music-player></app-music-player>
      <app-playlist></app-playlist>
    </div>
  </div>

  <!-- Efectos de fondo -->
  <div class="dark-background-effects">
    <div class="nebula"></div>
    <div class="stars"></div>
  </div>
</main>
