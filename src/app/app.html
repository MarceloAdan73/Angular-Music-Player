<main class="app-container">
  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="logo-container">
        <div class="angular-logo">
          <img src="https://angular.io/assets/images/logos/angular/angular.svg"
               alt="Angular Logo"
               title="Angular Logo"
               class="angular-image">
          <div class="app-title">
            <h1>Music Player</h1>
            <p class="app-subtitle">-Developed In Angular-</p>
          </div>
        </div>
      </div>
      <p class="tagline">Music In Angular</p>
    </div>
  </header>

  <!-- Contenido Principal -->
  <div class="main-content-wrapper">
    <div class="main-dark-content">
      <app-music-player></app-music-player>
      <app-playlist></app-playlist>
    </div>
  </div>

  <!-- Efectos de fondo -->
  <div class="dark-background-effects">
    <div class="nebula"></div>
    <div class="stars"></div>
  </div>
</main>
